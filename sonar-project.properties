# SonarCloud Configuration for Fixa-SRM
# Documentation: https://docs.sonarsource.com/sonarcloud/advanced-setup/analysis-parameters/
#
# Architecture: Svelte PWA + Hono/Bun Backend + Supabase + Valkey + pgmq

# =============================================================================
# REQUIRED METADATA
# =============================================================================
sonar.projectKey=Vattsa-11_Fixa-SRM
sonar.organization=vattsa-11

# Project display information
sonar.projectName=Fixa-SRM
sonar.projectVersion=0.0.1

# =============================================================================
# SOURCE CODE PATHS (Monorepo Structure)
# =============================================================================
# Add new directories as they are created (comma-separated)
sonar.sources=frontend/src,\
              backend/src,\
              workers/src,\
              shared/src,\
              db/migrations,\
              db/seeds

# =============================================================================
# EXCLUSIONS
# =============================================================================
# Build artifacts and dependencies
sonar.exclusions=**/node_modules/**,\
                 **/.svelte-kit/**,\
                 **/dist/**,\
                 **/build/**,\
                 **/.output/**,\
                 **/coverage/**,\
                 **/*.min.js,\
                 **/*.bundle.js,\
                 **/vendor/**,\
                 **/__mocks__/**

# Duplications - don't flag these as duplicates
sonar.cpd.exclusions=**/migrations/**,\
                     **/*.test.ts,\
                     **/*.spec.ts,\
                     **/test/**,\
                     **/__tests__/**

# =============================================================================
# LANGUAGE CONFIGURATION
# =============================================================================
# TypeScript/JavaScript (Frontend + Backend + Workers)
sonar.javascript.file.suffixes=.js,.jsx,.mjs,.cjs
sonar.typescript.file.suffixes=.ts,.tsx,.mts,.cts

# TypeScript configs (add backend when created)
# sonar.typescript.tsconfigPaths=frontend/tsconfig.json,backend/tsconfig.json,workers/tsconfig.json

# SQL (Supabase migrations & pgmq)
# sonar.plsql.file.suffixes=.sql

# =============================================================================
# TEST CONFIGURATION
# =============================================================================
# Test source directories (uncomment when tests are added)
# sonar.tests=frontend/src,backend/src,workers/src,shared/src

# Test file patterns
sonar.test.inclusions=**/*.test.ts,\
                      **/*.spec.ts,\
                      **/*.test.js,\
                      **/*.spec.js,\
                      **/__tests__/**/*,\
                      **/test/**/*

# =============================================================================
# COVERAGE REPORTS
# =============================================================================
# LCOV coverage paths (uncomment when coverage is configured)
# sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info,\
#                                   backend/coverage/lcov.info,\
#                                   workers/coverage/lcov.info

# =============================================================================
# QUALITY GATES & ANALYSIS
# =============================================================================
# Source encoding
sonar.sourceEncoding=UTF-8

# Fail CI if quality gate fails (recommended for PRs)
# sonar.qualitygate.wait=true

# Branch analysis (for PR decoration)
# sonar.pullrequest.provider=github
# sonar.pullrequest.github.repository=Vattsa-11/Fixa-SRM

# =============================================================================
# SECURITY HOTSPOTS
# =============================================================================
# Paths containing sensitive configurations to review
# sonar.security.hotspots.inclusions=**/config/**,**/.env.example,**/nginx/**

# =============================================================================
# FUTURE SERVICES (uncomment as you add them)
# =============================================================================
# Backend (Hono + Bun)
# - Add backend/src to sonar.sources when created
# - Add backend/tsconfig.json to tsconfigPaths

# Workers (Notification Worker)
# - Add workers/src to sonar.sources when created

# Shared libraries
# - Add shared/src to sonar.sources when created

# Database
# - Add db/migrations to sonar.sources for SQL analysis
